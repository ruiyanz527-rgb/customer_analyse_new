name: Unzip and Commit tar.gz files
on:
  push:
    paths:
      - '*.tar.gz'  # 触发条件：上传 tar.gz 文件
jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create extract directory
        run: mkdir -p extracted
      - name: Extract all tar.gz files
        run: |
          tar -zxvf markdown_files.tar.gz -C extracted
          tar -zxvf python_files.tar.gz -C extracted
          tar -zxvf txt_csv_files.tar.gz -C extracted
      - name: Commit extracted files
        run: |
          git config --global user.name "ruiyanz527-rgb"
          git config --global user.email "ruiyanz527@gmail.com"
          git add extracted/
          git commit -m "Auto extract all tar.gz files"
          git push
